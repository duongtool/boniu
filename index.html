<style>

@font-face {
    font-family: "PacificoLocal";
    src: url("fonts/Pacifico-Regular.woff2") format("woff2"),
         url("fonts/Pacifico-Regular.ttf") format("truetype");
    font-weight: 400; font-style: normal; font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; }
body {
    margin: 0; overflow: hidden;
    min-height: 100vh; min-height: 100svh; min-height: 100dvh;
    background: #000; color: #fff;
    font-family: "PacificoLocal", "Pacifico", cursive;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
}
canvas { display: block; width: 100%; height: 100%; }
#ui { display: none; }
#info {
    font-size: 22px; letter-spacing: 2px; padding: 10px 24px;
    background: rgba(60,20,45,0.5); border-radius: 10px; display: inline-block;
    text-shadow: 0 0 10px rgba(255,105,180,0.8);
    border: 1px solid rgba(255,182,193,0.25);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    transition: opacity 0.4s ease; min-height: 20px;
}

#loading {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    z-index: 1000; transition: opacity 0.6s ease-out;
}
#loading span { font-size: 24px; letter-spacing: 2px; margin-bottom: 15px; }
#progress-container {
    width: 60%; max-width: 300px; height: 6px;
    background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;
}
#progress {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #ff69b4, #ffb6c1);
    transition: width 0.3s ease; border-radius: 3px;
}

#start-wrap {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 200; display: none; flex-direction: column;
    align-items: center; gap: 10px; cursor: pointer;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation; transition: transform 0.2s ease;
}
#start-wrap.held { transform: translateX(-50%) scale(1.05); }
#start-label {
    font-family: "PacificoLocal","Pacifico",cursive;
    color: rgba(255,182,193,0.85); font-size: 13px;
    text-shadow: 0 0 8px rgba(255,105,180,0.6); letter-spacing: 1px;
}
#start-wrap svg { width: 68px; height: 68px; filter: drop-shadow(0 0 8px rgba(255,105,180,0.45)); }
.ring-pulse { fill: rgba(255,105,180,0.1); animation: ringPulse 2s ease-in-out infinite; }
@keyframes ringPulse { 0%,100%{opacity:.5} 50%{opacity:.15} }
.ring-track { fill: none; stroke: rgba(255,182,193,0.2); stroke-width: 3; }
.ring-fill {
    fill: none; stroke: #ff69b4; stroke-width: 3.5; stroke-linecap: round;
    stroke-dasharray: 163.36; stroke-dashoffset: 163.36;
    transform-origin: 34px 34px; transform: rotate(-90deg);
    transition: stroke-dashoffset 1s linear;
}


#transition-overlay {
    position: fixed; inset: 0; background: #000; z-index: 500;
    opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
}
@keyframes flashFade { 0%{opacity:1} 100%{opacity:0} }

#sphere-click-hint {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 300; padding: 12px 24px; background: rgba(0,0,0,0.65); color: #fff;
    font-size: 1rem; border-radius: 24px; pointer-events: none; opacity: 0;
    transition: opacity 0.35s ease;
    font-family: "PacificoLocal","Pacifico",cursive; letter-spacing: 1px;
}
#sphere-click-hint.visible { opacity: 1; }
#btn-flying-corner {
    position: fixed; bottom: 20px; right: 20px; z-index: 300; display: none;
    padding: 10px 18px; font-size: 20px; border: none; border-radius: 24px;
    background: rgba(255,105,180,0.9); color: #fff; cursor: pointer;
    box-shadow: 0 2px 10px rgba(255,105,180,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
}
#btn-flying-corner.visible { display: block; }
#btn-flying-corner:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(255,105,180,0.5); }
#sphere-particles-bg { position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0; transition: opacity 1s; }
.sp-particle {
    position: absolute; width: 4px; height: 4px;
    background: rgba(255,105,180,0.6); border-radius: 50%;
    animation: spFloat 15s infinite ease-in-out;
}
@keyframes spFloat {
    0%,100%{transform:translateY(100vh) rotate(0deg);opacity:0}
    10%{opacity:1} 80%{opacity:1}
    90%,100%{transform:translateY(-100vh) rotate(720deg);opacity:0}
}

#cupid-letter-overlay {
    position: fixed; inset: 0;
    display: none; justify-content: center; align-items: center;
    z-index: 350; pointer-events: none;
}
#cupid-letter-overlay.visible { display: flex; pointer-events: auto; }
#cupid-letter-overlay .cupid-space {
    position: absolute; inset: 0; overflow: hidden;
}
#cupid-flying-img {
    position: absolute; width: clamp(100px,20vw,180px); height: auto;
    pointer-events: none; transform: translate(-50%,-50%); z-index: 352;
}
#letter-envelope-img {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: clamp(120px,28vw,220px); height: auto;
    cursor: pointer; display: none; z-index: 355;
    transition: transform 0.25s ease;
    animation: none;
}
#letter-envelope-img.visible { display: block; animation: letterPopIn 0.5s cubic-bezier(0.22,1,0.36,1); }
#letter-envelope-img:hover { transform: translate(-50%,-50%) scale(1.07); }
@keyframes letterPopIn {
    from{opacity:0;transform:translate(-50%,-54%) scale(0.88)}
    to{opacity:1;transform:translate(-50%,-50%) scale(1)}
}

#cupid-letter-frame {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: min(90vw, 540px); max-height: 82vh;
    display: none; flex-direction: column;
    z-index: 360; border-radius: 20px; overflow: hidden;
    background: #fffaf8;
    border: 1px solid rgba(210,140,165,0.3);
    box-shadow:
        0 2px 0 rgba(255,255,255,0.8) inset,
        0 12px 48px rgba(170,70,110,0.2),

    pointer-events: auto;
}
#cupid-letter-frame.visible {
    display: flex;
    animation: letterFrameIn 0.55s cubic-bezier(0.22,1,0.36,1);
}
@keyframes letterFrameIn {
    from{opacity:0;transform:translate(-50%,-53%) scale(0.92)}
    to{opacity:1;transform:translate(-50%,-50%) scale(1)}
}

.letter-header {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 18px 11px;
    border-bottom: 1px solid rgba(210,140,165,0.18);
    background: rgba(255,220,232,0.35);

}
.letter-header-avatar {

.letter-header-avatar-fallback {

}
.letter-header-info { flex: 1; min-width: 0; }
.letter-header-title {
    font-family: "Dancing Script", cursive;
    font-size: 1.05rem; font-weight: 700;

}
.letter-header-sub {
    font-family: "Cormorant Garamond", Georgia, serif;

    letter-spacing: 0.5px; line-height: 1;
}
.letter-header-deco {
    font-size: 18px; opacity: 0.6; flex-shrink: 0;
}

.letter-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 20px 22px 20px;
    scrollbar-width: thin;
    scrollbar-color: rgba(194,88,122,0.2) transparent;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
}
.letter-body::-webkit-scrollbar { width: 3px; }
.letter-body::-webkit-scrollbar-track { background: transparent; }
.letter-body::-webkit-scrollbar-thumb { background: rgba(194,88,122,0.22); border-radius: 3px; }

.letter-content {
    font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
    font-size: clamp(1rem, 2.4vw, 1.11rem);
    font-weight: 400; line-height: 1.9;
    color: #5a2e44; letter-spacing: 0.015em;
    white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word;
    text-align: left;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}
.letter-cursor {
    display: inline-block; width: 2px; height: 1.05em;
    background: #c25070; margin-left: 1px;
    animation: blinkCursor 0.75s steps(1) infinite;
    vertical-align: text-bottom;
}
@keyframes blinkCursor { 0%,49%{opacity:1} 50%,100%{opacity:0} }

.letter-image-wrap {
    margin-top: 20px; text-align: center;
    opacity: 0; transform: translateY(12px);
}
.letter-image-wrap.visible {
    animation: imgReveal 0.9s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes imgReveal {
    from{opacity:0;transform:translateY(16px) scale(0.92)}
    to{opacity:1;transform:translateY(0) scale(1)}
}
.letter-inline-image {
    display: block; max-width: min(78vw, 260px);
    margin: 0 auto; border-radius: 12px;
    border: 1px solid rgba(210,140,165,0.35);
    box-shadow: 0 4px 18px rgba(170,70,110,0.15);
}
.letter-image-caption {
    display: block; margin-top: 8px;
    font-family: "Dancing Script", cursive;
    font-size: 1rem; color: #c25070; letter-spacing: 0.15em;
}

.letter-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 18px 11px;
    border-top: 1px solid rgba(210,140,165,0.15);
    background: rgba(255,235,242,0.5);
    flex-shrink: 0; gap: 8px;
}
.letter-signature {
    font-family: "Dancing Script", cursive;
    font-size: 0.88rem; font-weight: 600;
    color: rgba(180,70,105,0.65); letter-spacing: 0.3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1;
}

@media (max-width: 480px) {
    #cupid-letter-frame { width: 94vw; max-height: 78vh; border-radius: 16px; }
    .letter-body { padding: 16px 15px 16px; }
    .letter-content { font-size: 0.98rem; line-height: 1.82; }
}

{

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { createNoise3D, createNoise4D } from 'simplex-noise';

(async () => {

const cfg = window.APP_CONFIG;
const enableMorphEffect        = cfg.enableMorphEffect !== false;
const enableSphere             = cfg.enableSphere !== false;
const enableSphereFlyingImages = cfg.enableSphereFlyingImages !== false;
const enableLetter             = cfg.enableLetter !== false;
const enableWebsiteInfo        = cfg.enableWebsiteInfo !== false;

let scene, camera, renderer, controls, clock;
let composer, bloomPass;
let particlesGeometry, particlesMaterial, particleSystem;
let backgroundParticleSystem=null, backgroundParticlesGeometry=null, backgroundParticlesMaterial=null;
let backgroundSourcePositions=null;
let currentPositions, sourcePositions, targetPositions;
let particleSizes, particleOpacities, particleEffectStrengths;
let noise3D, noise4D;
let isInitialized = false;

const isDesktop = window.innerWidth >= 768;
const CONFIG = {
    particleCount: 25000, imageParticleCount: 400000,
    textParticleCountMin: 6000, textParticleCountMax: 120000, textParticlesPerChar: 3500,
    shapeSize: 14, textShapeSize: isDesktop ? 22 : 14,
    swarmDistanceFactor: 1.5, swirlFactor: 4.0, noiseFrequency: 0.1,
    noiseTimeScale: 0.04, noiseMaxStrength: 2.8, morphDuration: 2.0,
    particleSizeRange: [0.06, 0.18], imageParticleSizeRange: [0.038, 0.052],
    bloomStrength: 0.9, bloomRadius: 0.5, bloomThreshold: 0.15,
    idleFlowStrength: 0.25, idleFlowSpeed: 0.08, idleRotationSpeed: 0.02,
    morphSizeFactor: 0.5, morphBrightnessFactor: 0.6
};

const sourceVec = new THREE.Vector3();

function generateFromImage(img, count, size) {
    let w = img.naturalWidth||img.width, h = img.naturalHeight||img.height;
    const maxDim=2600;
    if(w>maxDim||h>maxDim){const s=maxDim/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    const ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;ctx.drawImage(img,0,0,w,h);
    const data=ctx.getImageData(0,0,w,h).data,list=[];
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const idx=(y*w+x)*4,r=data[idx],g=data[idx+1],b=data[idx+2],a=data[idx+3];
        const br=(r+g+b)/3;
        if(a>10&&br>1)list.push({x,y,br,r,g,b,key:y*w+x});
    }
    if(!list.length)return null;
    list.sort((a,b)=>a.key-b.key);
    const actualCount=Math.min(count,list.length);
    const scale=size/Math.max(w,h),cx=w/2,cy=h/2,depthScale=size*0.06;
    const points=new Float32Array(actualCount*3),colors=new Float32Array(actualCount*3);
    for(let i=0;i<actualCount;i++){
        const idx=list.length<=actualCount?i:Math.floor((i*list.length)/actualCount);
        const p=list[Math.min(idx,list.length-1)];
        points[i*3]=(p.x-cx)*scale;points[i*3+1]=(cy-p.y)*scale;points[i*3+2]=(p.br/255)*depthScale;
        let r=p.r/255,g=p.g/255,b=p.b/255;
        const gray=0.299*r+0.587*g+0.114*b;
        r=gray+(r-gray)*1.12;g=gray+(g-gray)*1.12;b=gray+(b-gray)*1.12;
        const lum=0.299*r+0.587*g+0.114*b;
        if(lum>0.5){const t=(lum-0.5)/0.5,d=1-t*0.4;r*=d;g*=d;b*=d;}
        else if(lum<0.2){const l=1.25;r=Math.min(1,r*l);g=Math.min(1,g*l);b=Math.min(1,b*l);}
        colors[i*3]=Math.max(0,Math.min(1,r));colors[i*3+1]=Math.max(0,Math.min(1,g));colors[i*3+2]=Math.max(0,Math.min(1,b));
    }
    return {positions:points,colors};
}

/* ── Text → particles ── */
function generateFromText(text,count,size){
    if(!text||!text.trim())return null;
    const w=800,maxLW=680,fontSize=140,lineHeight=170;
    const ctx=document.createElement('canvas').getContext('2d');
    ctx.font=`bold ${fontSize}px "Pacifico",cursive`;
    const words=text.trim().split(/\s+/),lines=[];let line='';
    for(const word of words){const next=line?line+' '+word:word;if(ctx.measureText(next).width<=maxLW){line=next;}else{if(line)lines.push(line);line=word;}}
    if(line)lines.push(line);
    const h=Math.max(280,lines.length*lineHeight+60);
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    const ctx2=cv.getContext('2d');
    ctx2.fillStyle='#000';ctx2.fillRect(0,0,w,h);
    ctx2.fillStyle='#fff';ctx2.font=`bold ${fontSize}px "Pacifico",cursive`;
    ctx2.textAlign='center';ctx2.textBaseline='middle';
    const startY=h/2-(lines.length-1)*(lineHeight/2);
    lines.forEach((ln,i)=>ctx2.fillText(ln,w/2,startY+i*lineHeight));
    const data=ctx2.getImageData(0,0,w,h).data,list=[];
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
        const idx=(y*w+x)*4,br=(data[idx]+data[idx+1]+data[idx+2])/3;
        if(br>20)list.push({x,y,br,key:y*w+x});
    }
    if(!list.length)return null;
    list.sort((a,b)=>a.key-b.key);
    const scale=size/Math.max(w,h),cx=w/2,cy=h/2,depthScale=size*0.05,maxRadius=size*0.6;
    const points=new Float32Array(count*3),colors=new Float32Array(count*3);
    for(let i=0;i<count;i++){
        const idx=Math.min(Math.floor((i*list.length)/count),list.length-1);
        const p=list[idx];
        const px=(p.x-cx)*scale,py=(cy-p.y)*scale,pz=(p.br/255)*depthScale;
        points[i*3]=px;points[i*3+1]=py;points[i*3+2]=pz;
        const dist=Math.sqrt(px*px+py*py+pz*pz);
        const hue=THREE.MathUtils.mapLinear(dist,0,maxRadius,330,360);
        const c=new THREE.Color().setHSL(hue/360,0.82,0.45);
        colors[i*3]=c.r;colors[i*3+1]=c.g;colors[i*3+2]=c.b;
    }
    return{positions:points,colors};
}

let particleCount=0,isMorphing=false,morphStartTime=0;

function sharpParticleTexture(){
    const size=128,cv=document.createElement('canvas');cv.width=cv.height=size;
    const ctx=cv.getContext('2d');
    const g=ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
    g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.4,'rgba(255,255,255,0.98)');
    g.addColorStop(0.7,'rgba(255,255,255,0.6)');g.addColorStop(0.92,'rgba(255,255,255,0.15)');g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,size,size);
    return new THREE.CanvasTexture(cv);
}

function rebuildParticleSystem(result){
    const count=result.positions.length/3;particleCount=count;
    if(particleSystem){scene.remove(particleSystem);particlesGeometry.dispose();particlesMaterial.dispose();}
    currentPositions=new Float32Array(result.positions);
    sourcePositions=new Float32Array(result.positions);
    targetPositions=[new Float32Array(result.positions)];
    particlesGeometry=new THREE.BufferGeometry();
    particlesGeometry.setAttribute('position',new THREE.BufferAttribute(currentPositions,3));
    const[minS,maxS]=CONFIG.imageParticleSizeRange;
    particleSizes=new Float32Array(count);particleOpacities=new Float32Array(count);particleEffectStrengths=new Float32Array(count);
    for(let i=0;i<count;i++){particleSizes[i]=THREE.MathUtils.randFloat(minS,maxS);particleOpacities[i]=1;particleEffectStrengths[i]=0;}
    particlesGeometry.setAttribute('size',new THREE.BufferAttribute(particleSizes,1));
    particlesGeometry.setAttribute('opacity',new THREE.BufferAttribute(particleOpacities,1));
    particlesGeometry.setAttribute('aEffectStrength',new THREE.BufferAttribute(particleEffectStrengths,1));
    particlesGeometry.setAttribute('color',new THREE.BufferAttribute(result.colors,3));
    particlesMaterial=new THREE.ShaderMaterial({
        uniforms:{pointTexture:{value:sharpParticleTexture()}},
        vertexShader:`attribute float size;attribute float opacity;attribute float aEffectStrength;varying vec3 vColor;varying float vOpacity;varying float vEffectStrength;void main(){vColor=color;vOpacity=opacity;vEffectStrength=aEffectStrength;vec4 mvPosition=modelViewMatrix*vec4(position,1.0);float sizeScale=1.0-vEffectStrength*0.5;gl_PointSize=size*sizeScale*(650.0/-mvPosition.z);gl_Position=projectionMatrix*mvPosition;}`,
        fragmentShader:`uniform sampler2D pointTexture;varying vec3 vColor;varying float vOpacity;varying float vEffectStrength;void main(){float alpha=texture2D(pointTexture,gl_PointCoord).a;if(alpha<0.05)discard;gl_FragColor=vec4(vColor,alpha*vOpacity);}`,
        blending:THREE.NormalBlending,depthTest:true,depthWrite:false,transparent:true,vertexColors:true
    });
    particleSystem=new THREE.Points(particlesGeometry,particlesMaterial);
    scene.add(particleSystem);
}

function startMorphToResult(result){
    sourcePositions=new Float32Array(particlesGeometry.attributes.position.array);
    targetPositions=[new Float32Array(result.positions)];
    particlesGeometry.attributes.color.array.set(result.colors);
    particlesGeometry.attributes.color.needsUpdate=true;

        fragmentShader:`uniform sampler2D pointTexture;varying vec3 vColor;varying float vOpacity;varying float vEffectStrength;void main(){float alpha=texture2D(pointTexture,gl_PointCoord).a;if(alpha<0.05)discard;gl_FragColor=vec4(vColor,alpha*vOpacity);}`,

    if(startLabel)startLabel.textContent=isAndroid?'Chạm 2 lần để bắt đầu':'Giữ để bắt đầu';

async function startAutoPlay(){

    const morphTexts=(cfg.morphTexts&&cfg.morphTexts.length)?cfg.morphTexts:['happy','bon iu'];
    for(const text of morphTexts){showText(text);await sleep(MORPH_WAIT_MS+SEQUENCE_HOLD_MS);}
    if(_preloadedImg){
        const imgLow=generateFromImage(_preloadedImg,AUTOPLAY_TEXT_COUNT,CONFIG.textShapeSize);
        if(imgLow){
            bloomPass.strength=0.22;bloomPass.threshold=0.35;
            if(particleSystem&&particleCount===imgLow.positions.length/3)startMorphToResult(imgLow);
            else rebuildParticleSystem(imgLow);
        }

        morphImageOverlay=createMorphImageOverlay(_preloadedImg);
        morphOverlayFadeStartTime=clock.getElapsedTime();

    if(enableSphere)startSpherePhase();

let isScatterPhase=false,isExploding=false,explodeStartTime=0,explodeVelocities=null,explodeStartPositions=null;

function triggerExplosion(){
    if(!particleSystem||particleCount===0)return;
    isMorphing=false;removeMorphImageOverlay();isExploding=true;explodeStartTime=clock.getElapsedTime();
    explodeVelocities=new Float32Array(particleCount*3);explodeStartPositions=new Float32Array(sourcePositions);
    for(let i=0;i<particleCount;i++){
        const i3=i*3,dir=new THREE.Vector3((Math.random()-0.5)*2,(Math.random()-0.5)*2,(Math.random()-0.2)*2).normalize();
        const speed=4+Math.random()*14;
        explodeVelocities[i3]=dir.x*speed;explodeVelocities[i3+1]=dir.y*speed;explodeVelocities[i3+2]=dir.z*speed;
    }
}

/* ── Animate loop ── */
function animate(){
    requestAnimationFrame(animate);if(!isInitialized)return;
    const elapsedTime=clock.getElapsedTime(),deltaTime=clock.getDelta();
    controls.update();
    if(particlesGeometry&&particleCount>0){
        const positions=particlesGeometry.attributes.position.array;
        const effectStrengths=particlesGeometry.attributes.aEffectStrength.array;
        updateIdleAnimation(positions,effectStrengths,elapsedTime,deltaTime);
        particlesGeometry.attributes.position.needsUpdate=true;
    }
    if(backgroundParticlesGeometry&&backgroundSourcePositions){
        const pos=backgroundParticlesGeometry.attributes.position.array;
        for(let i=0;i<BACKGROUND_SCATTER_COUNT;i++){
            const i3=i*3;sourceVec.fromArray(backgroundSourcePositions,i3);const drift=0.2;
            pos[i3]=sourceVec.x+noise3D(sourceVec.x*0.4,sourceVec.y*0.4,elapsedTime*0.18)*drift;
            pos[i3+1]=sourceVec.y+noise3D(sourceVec.y*0.4,sourceVec.z*0.4,elapsedTime*0.18)*drift;
            pos[i3+2]=sourceVec.z+noise3D(sourceVec.z*0.4,sourceVec.x*0.4,elapsedTime*0.18)*drift;
        }
        backgroundParticlesGeometry.attributes.position.needsUpdate=true;
    }
    if(morphImageOverlay&&morphOverlayFadeStartTime!=null&&morphImageOverlay.material){
        const t=(elapsedTime-morphOverlayFadeStartTime)/(MORPH_OVERLAY_FADE_MS/1000);
        if(t>=1){morphImageOverlay.material.opacity=1;morphOverlayFadeStartTime=null;}
        else morphImageOverlay.material.opacity=t*t*(3-2*t);
    }
    if(spPhase)updateSpherePhase();
    if(cupidLetterState==='flying')updateCupidFly();
    if(spPhase){renderer.render(scene,camera);}
    else if(morphImageOverlay){
        camera.layers.disable(1);composer.render(deltaTime);camera.layers.enable(1);
        camera.layers.disable(0);renderer.autoClear=false;renderer.render(scene,camera);renderer.autoClear=true;camera.layers.enable(0);
    }else{composer.render(deltaTime);}
}

function updateIdleAnimation(positions,effectStrengths,elapsedTime,deltaTime){
    if(isExploding&&explodeVelocities&&explodeStartPositions){
        const t=elapsedTime-explodeStartTime;
        for(let i=0;i<particleCount;i++){
            const i3=i*3;
            positions[i3]=explodeStartPositions[i3]+explodeVelocities[i3]*t;
            positions[i3+1]=explodeStartPositions[i3+1]+explodeVelocities[i3+1]*t;
            positions[i3+2]=explodeStartPositions[i3+2]+explodeVelocities[i3+2]*t;
        }
        return;
    }
    if(isMorphing&&targetPositions&&targetPositions[0]){
        const t=Math.min(1,(elapsedTime-morphStartTime)/CONFIG.morphDuration);
        const smoothT=t*t*(3-2*t),target=targetPositions[0];
        for(let i=0;i<particleCount;i++){
            const i3=i*3;
            positions[i3]=sourcePositions[i3]+(target[i3]-sourcePositions[i3])*smoothT;
            positions[i3+1]=sourcePositions[i3+1]+(target[i3+1]-sourcePositions[i3+1])*smoothT;
            positions[i3+2]=sourcePositions[i3+2]+(target[i3+2]-sourcePositions[i3+2])*smoothT;
        }
        if(t>=1){isMorphing=false;sourcePositions=new Float32Array(target);}
        return;
    }
    const driftAmt=isScatterPhase?0.25:0;let needsReset=false;
    for(let i=0;i<particleCount;i++){
        const i3=i*3;sourceVec.fromArray(sourcePositions,i3);
        if(driftAmt>0){
            positions[i3]=sourceVec.x+noise3D(sourceVec.x*0.4,sourceVec.y*0.4,elapsedTime*0.18)*driftAmt;
            positions[i3+1]=sourceVec.y+noise3D(sourceVec.y*0.4,sourceVec.z*0.4,elapsedTime*0.18)*driftAmt;
            positions[i3+2]=sourceVec.z+noise3D(sourceVec.z*0.4,sourceVec.x*0.4,elapsedTime*0.18)*driftAmt;
        }else{positions[i3]=sourceVec.x;positions[i3+1]=sourceVec.y;positions[i3+2]=sourceVec.z;}
        if(effectStrengths[i]!==0){effectStrengths[i]=0;needsReset=true;}
    }
    if(needsReset)particlesGeometry.attributes.aEffectStrength.needsUpdate=true;
}

function spCreatePatch(r,t0,t1,p0,p1,ws,hs){
    const geo=new THREE.BufferGeometry(),verts=[],uvs=[],idx=[];
    for(let y=0;y<=hs;y++){const v=y/hs,phi=p0+v*(p1-p0);for(let x=0;x<=ws;x++){const u=x/ws,theta=t0+u*(t1-t0);verts.push(r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));uvs.push(u,1-v);}}
    for(let y=0;y<hs;y++)for(let x=0;x<ws;x++){const a=y*(ws+1)+x,b=a+1,c=a+(ws+1),d=c+1;idx.push(a,c,b,b,c,d);}
    geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
    geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
    geo.setIndex(idx);geo.computeVertexNormals();return geo;
}

function spBuildSphere(){
    let imgIdx=0,midIdx=0;const midRows=[2,3];
    spPhiStart=Math.PI*SP_POLAR_MARGIN;spPhiEnd=Math.PI*(1-SP_POLAR_MARGIN);spPhiRange=spPhiEnd-spPhiStart;
    const len=spTextures.length;
    for(let row=0;row<SP_ROWS;row++){
        const p1=spPhiStart+(row/SP_ROWS)*spPhiRange,p2=spPhiStart+((row+1)/SP_ROWS)*spPhiRange;
        const pMid=(p1+p2)/2,circ=2*Math.PI*SP_RADIUS*Math.sin(pMid),imgH=spPhiRange*SP_RADIUS/SP_ROWS;
        const n=Math.max(3,Math.round(circ/imgH)),tStep=(2*Math.PI)/n;
        for(let col=0;col<n;col++){
            const t=col*tStep;
            const tex=midRows.includes(row)?spTextures[midIdx++%len]:spTextures[imgIdx++%len];
            const geo=spCreatePatch(SP_RADIUS,t,t+tStep,p1,p2,12,12);
            const mat=new THREE.MeshBasicMaterial({map:tex,side:THREE.DoubleSide,transparent:true,opacity:1});
            const mesh=new THREE.Mesh(geo,mat);
            mesh.userData.introStartPos=spRandOnSphere(SP_INTRO_RADIUS);
            mesh.userData.introDelay=Math.random()*SP_INTRO_STAGGER_MS;
            mesh.position.copy(mesh.userData.introStartPos);
            spGroup.add(mesh);spMeshes.push(mesh);
        }
    }
    spIntroStartTime=Date.now();
}

function spGlowTexture(size){
    const c=document.createElement('canvas');c.width=c.height=size;
    const ctx=c.getContext('2d'),cx=size/2;
    const g=ctx.createRadialGradient(cx,cx,0,cx,cx,cx);
    g.addColorStop(0,'rgba(255,105,180,1)');g.addColorStop(0.2,'rgba(255,182,193,0.85)');
    g.addColorStop(0.45,'rgba(255,105,180,0.5)');g.addColorStop(0.7,'rgba(255,105,180,0.2)');g.addColorStop(1,'rgba(255,105,180,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,size,size);return new THREE.CanvasTexture(c);
}

function spRoundedRectGeo(w,h,radius){
    const shape=new THREE.Shape(),x=-w/2,y=-h/2;
    shape.moveTo(x+radius,y);shape.lineTo(x+w-radius,y);shape.quadraticCurveTo(x+w,y,x+w,y+radius);
    shape.lineTo(x+w,y+h-radius);shape.quadraticCurveTo(x+w,y+h,x+w-radius,y+h);
    shape.lineTo(x+radius,y+h);shape.quadraticCurveTo(x,y+h,x,y+h-radius);
    shape.lineTo(x,y+radius);shape.quadraticCurveTo(x,y,x+radius,y);
    const geo=new THREE.ShapeGeometry(shape),pos=geo.attributes.position,uvsArr=[];
    for(let i=0;i<pos.count;i++)uvsArr.push((pos.getX(i)+w/2)/w,(pos.getY(i)+h/2)/h);
    geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvsArr,2));return geo;
}

function spCreateFloatingImages(){
    spFloatingGroup=new THREE.Group();scene.add(spFloatingGroup);
    const total=40,grid=16,used=[],glowTex=spGlowTexture(128);
    function validPos(x,y,z,d){return used.every(p=>Math.hypot(x-p.x,y-p.y,z-p.z)>=d);}
    function findPos(size){
        const d=size*1.5+1;
        for(let i=0;i<100;i++){const x=(Math.random()-.5)*grid,y=(Math.random()-.5)*grid,z=(Math.random()-.5)*grid;if(validPos(x,y,z,d)){used.push({x,y,z});return{x,y,z};}}
        const a=Math.random()*Math.PI*2,dist=grid/2+Math.random()*2;
        return{x:Math.cos(a)*dist,y:(Math.random()-.5)*grid,z:Math.sin(a)*dist};
    }
    for(let i=0;i<total;i++){
        const ti=i%spTextures.length,tex=spTextures[ti];
        const imgUrl=(spSphereImageUrls[ti]||'').toString(),isDefault=imgUrl.indexOf('imagedefault')!==-1;
        const sv=0.5+Math.random()*2,w=1.5*sv,h=1*sv,cr=0.15*sv,ig=new THREE.Group();
        let goMat=null,gMat=null;
        if(!isDefault){
            goMat=new THREE.MeshBasicMaterial({map:glowTex,transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false});ig.add(new THREE.Mesh(spRoundedRectGeo(w*2.2,h*2.2,cr*2.2),goMat));
            gMat=new THREE.MeshBasicMaterial({map:glowTex,transparent:true,opacity:0,side:THREE.DoubleSide,depthWrite:false});ig.add(new THREE.Mesh(spRoundedRectGeo(w*1.5,h*1.5,cr*1.5),gMat));
        }
        const iMat=new THREE.MeshBasicMaterial({map:tex,side:THREE.DoubleSide,transparent:true,opacity:0});
        ig.add(new THREE.Mesh(spRoundedRectGeo(w,h,cr),iMat));
        const tPhi=Math.acos(2*Math.random()-1),tTheta=Math.random()*Math.PI*2;
        ig.position.set(SP_RADIUS*.5*Math.sin(tPhi)*Math.cos(tTheta),SP_RADIUS*.5*Math.cos(tPhi),SP_RADIUS*.5*Math.sin(tPhi)*Math.sin(tTheta));
        const tp=findPos(Math.max(w,h));
        ig.userData={startPos:ig.position.clone(),targetPos:new THREE.Vector3(tp.x,tp.y,tp.z),
            floatSpeedY:0.3+Math.random()*0.5,floatAmplY:0.1+Math.random()*0.2,floatPhase:Math.random()*Math.PI*2,
            delay:Math.random()*0.5,basePos:new THREE.Vector3(tp.x,tp.y,tp.z),iMat,gMat,goMat,
            driftSpeed:0.002+Math.random()*0.003,baseZ:tp.z,noGlow:isDefault};
        spFloatingGroup.add(ig);spFloatingImages.push(ig);
    }
}

    if(spIsExploded)return;spIsExploded=true;spExplosionProgress=0;spFadeProgress=0;

function spHandleTap(cx,cy){

function startLetterTypingEffect(letterContent,cursor){
    const text=CUPID_LETTER_TEXT;
    const TYPING_SPEED_MS=28,NEWLINE_DELAY_MS=180;
    const chars=Array.from(text);
    let currentIndex=0,timerId=null;

    function typeNextChar(){
        if(currentIndex<chars.length){
            const char=chars[currentIndex];
            letterContent.insertBefore(document.createTextNode(char),cursor);
            currentIndex++;
            if(char==='\n'||currentIndex%60===0){
                letterContent.parentElement.scrollTop=letterContent.parentElement.scrollHeight;
            }
            timerId=setTimeout(typeNextChar,char==='\n'?NEWLINE_DELAY_MS:TYPING_SPEED_MS);
        }else{
            timerId=setTimeout(()=>showLetterFinished(letterContent,cursor),400);
        }
    }
    timerId=setTimeout(typeNextChar,400);
}

function updateSpherePhase(){
    spTime+=0.01;
    if(spIntroComplete&&!spHintClickShown&&spIntroCompleteTime>0&&(Date.now()-spIntroCompleteTime)>=SP_HINT_DELAY_MS){spHintClickShown=true;spShowHint('Click vào nhé');}
    if(spHasZoomedIn&&!spIsExploded&&!spHintFlyShown&&spZoomInTime>0&&(Date.now()-spZoomInTime)>=SP_HINT_DELAY_MS){spHintFlyShown=true;spShowHint('Click lần nữa nào');}
    if(spRainMesh&&spRainPositions){
        const n=spRainPositions.length/3;
        for(let j=0;j<n;j++){
            spRainPositions[j*3+1]+=SP_RAIN_SPEED;
            if(spRainPositions[j*3+1]>6){spRainPositions[j*3+1]=-SP_FLYOUT_BOUND;spRainPositions[j*3]=(Math.random()-.5)*2*SP_FLYOUT_BOUND;spRainPositions[j*3+2]=(Math.random()-.5)*2*SP_FLYOUT_BOUND;}
        }
        spRainMesh.geometry.attributes.position.needsUpdate=true;
    }
    if(spIsExploded){
        spExplosionProgress=Math.min(1,spExplosionProgress+0.018);
        spFadeProgress=Math.min(1,spFadeProgress+0.04);
        spGroup.children.forEach(child=>{
            if(child.material){child.material.opacity=Math.max(0,1-spFadeProgress);if(child.material.opacity<=0)child.visible=false;}
        });
        spClickSphere.visible=false;
        if(spFloatingGroup){
            spDriftTiltAngle+=spDriftTiltDir*0.0003;
            if(spDriftTiltAngle>=0.25){spDriftTiltAngle=0.25;spDriftTiltDir=-1;}
            else if(spDriftTiltAngle<=-0.25){spDriftTiltAngle=-0.25;spDriftTiltDir=1;}
            spFloatingGroup.rotation.y=spDriftTiltAngle;
        }
        const maxY=10,minY=-10,fMaxY=25;
        spFloatingImages.forEach((img,idx)=>{
            const d=img.userData,dp=Math.max(0,(spExplosionProgress-d.delay)/(1-d.delay));
            if(dp>0){
                const t=Math.min(1,dp),eased=1-Math.pow(1-t,2);
                const fY=spIsFinalFlyUp?0:Math.sin(spTime*2*d.floatSpeedY+d.floatPhase)*d.floatAmplY;
                const elapsed=(Date.now()-spExplosionStartTime)/1000;
                const FAST=isMobileSP?25:18,FTAPER=isMobileSP?4:2.5,TEND=isMobileSP?7:5;
                let dm=spIsFinalFlyUp?80:(elapsed<FTAPER?FAST:(elapsed<TEND?FAST-(FAST-1)*(elapsed-FTAPER)/(TEND-FTAPER):1));
                d.basePos.y+=d.driftSpeed*dm;
                if(eased<1){
                    img.position.x=d.startPos.x+(d.targetPos.x-d.startPos.x)*eased;
                    img.position.z=d.startPos.z+(d.targetPos.z-d.startPos.z)*eased;
                    img.position.y=d.startPos.y+(d.targetPos.y-d.startPos.y)*eased+(d.basePos.y-d.targetPos.y)+fY;
                }else{
                    img.position.x=d.basePos.x;img.position.y=d.basePos.y+fY;img.position.z=d.baseZ;
                }
                if(spIsFinalFlyUp){if(d.basePos.y>=fMaxY)img.visible=false;}
                else{if(d.basePos.y>maxY){d.basePos.y=minY;d.basePos.x=(Math.random()-.5)*16;d.baseZ=(Math.random()-.5)*16;img.position.x=d.basePos.x;img.position.z=d.baseZ;}}
                const op=Math.min(1,dp*2),gp=0.65+Math.sin(spTime*3+idx*0.5)*0.25;
                d.iMat.opacity=op;
                if(!d.noGlow&&d.gMat&&d.goMat){d.gMat.opacity=Math.min(1,op*gp);d.goMat.opacity=Math.min(1,op*gp*0.75);}
            }
        });
    }else if(spIntroComplete){
        if(spNeedZoomIn){
            camera.position.lerp(spZoomInTarget,0.08);
            if(camera.position.distanceTo(controls.target)<=controls.minDistance+0.05)spNeedZoomIn=false;
        }
        spGroup.rotation.y+=0.001;
        if(spParticlesMesh){spParticlesMesh.rotation.y+=0.0005;spParticlesMesh.rotation.x+=0.00025;}
    }
    if(!spIntroComplete&&spIntroStartTime>0&&spMeshes.length>0){
        const elapsed=Date.now()-spIntroStartTime,dur=SP_INTRO_DURATION_MS/1000;
        spMeshes.forEach(mesh=>{
            const delay=(mesh.userData.introDelay||0)/1000,t=Math.min(1,Math.max(0,(elapsed/1000-delay)/dur));
            const eased=1-Math.pow(1-t,1.4);
            mesh.position.lerpVectors(mesh.userData.introStartPos,new THREE.Vector3(0,0,0),eased);
            if(mesh.material)mesh.material.opacity=1;
        });
        if(elapsed>SP_INTRO_DURATION_MS+SP_INTRO_STAGGER_MS){
            spIntroComplete=true;spIntroCompleteTime=Date.now();
            spMeshes.forEach(m=>{m.position.set(0,0,0);if(m.material){m.material.opacity=1;m.visible=true;}});
        }
    }
}

(function(){

    document.title=title;
    const metaTitle=document.querySelector('meta[name="apple-mobile-web-app-title"]');if(metaTitle)metaTitle.content=title;
    const iconSrc=(enableWebsiteInfo&&cfg.appIcon)?cfg.appIcon:'image/anh1.jpg';
    document.querySelectorAll('link[rel*="apple-touch-icon"],link[rel="icon"]').forEach(el=>el.href=iconSrc);
})();
(function(){
    if(/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1))return;
    const link=document.createElement('link');link.rel='manifest';document.head.appendChild(link);
    const iconUrl=new URL(cfg.appIcon||'image/anh1.jpg',window.location.href).href;
    const name=cfg.appTitle||'Món Quà Nhỏ';
    const manifest={name,short_name:name,description:'Món quà đặc biệt dành riêng cho bạn',start_url:'./',display:'standalone',orientation:'portrait',background_color:'#1b0a1c',theme_color:'#1b0a1c',scope:'./',icons:[{src:iconUrl,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:iconUrl,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
    try{const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});link.href=URL.createObjectURL(blob);}catch(e){}
})();

const bgMusic=new Audio(cfg.bgMusic||'music/tqd.mp3');
bgMusic.loop=true;bgMusic.volume=typeof cfg.bgVolume==='number'?cfg.bgVolume:0.55;bgMusic.preload='auto';
function startBgMusic(){
    try{
        bgMusic.volume=typeof cfg.bgVolume==='number'?cfg.bgVolume:0.55;
        if(bgMusic.paused){
            bgMusic.currentTime=0;
            const p=bgMusic.play();if(p&&typeof p.catch==='function')p.catch(err=>console.warn('Không thể phát nhạc:',err));
        }
    }catch(e){console.warn(e);}
}
function stopBgMusic(){try{bgMusic.pause();bgMusic.currentTime=0;}catch(e){}}

init();
document.getElementById('letter-envelope-img')?.addEventListener('click',handleLetterEnvelopeClick);

})();
</script>
</body>
